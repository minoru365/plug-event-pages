<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLUG Guide - 移転のお知らせ</title>
<style>
  :root {
    --bg: #f5f7fb;
    --panel: #ffffff;
    --text: #1e2a39;
    --subtext: #5f6c7b;
    --accent: #1f5fa8;
    --line: #d8e0eb;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    font-family: "Hiragino Sans", "Meiryo", sans-serif;
    color: var(--text);
    background: linear-gradient(180deg, #f9fbff 0%, var(--bg) 100%);
  }

  main {
    width: min(560px, 100%);
    padding: 40px 32px;
    border: 1px solid var(--line);
    border-radius: 20px;
    background: var(--panel);
    text-align: center;
    box-shadow: 0 16px 40px rgba(21, 38, 63, 0.08);
  }

  h1 {
    font-size: clamp(1.8rem, 4vw, 2.4rem);
    line-height: 1.3;
  }

  p {
    margin-top: 16px;
    color: var(--subtext);
    line-height: 1.8;
    font-size: 1rem;
  }

  a {
    color: var(--accent);
  }

  .button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-top: 28px;
    padding: 14px 22px;
    border-radius: 999px;
    background: var(--accent);
    color: #fff;
    font-weight: 700;
    text-decoration: none;
  }

  .note {
    margin-top: 18px;
    font-size: 0.92rem;
  }
</style>
</head>
<body>
<main>
  <h1>PLUG Guide は移転しました</h1>
  <p>
    このページは新しいサイトへ引っ越しました。<br>
    最新の案内は下記のページをご利用ください。
  </p>
  <a class="button" href="https://plug365.github.io/PLUGGuide/">新しい PLUG Guide を開く</a>
  <p class="note">
    移転先: <a href="https://plug365.github.io/PLUGGuide/">https://plug365.github.io/PLUGGuide/</a>
  </p>
</main>
</body>
</html>
